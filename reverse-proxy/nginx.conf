
upstream news_cluster {
    server backend1:3000;
    server backend2:3000;
    server backend3:3000;
}

server {

    listen 5000;
    location /api {
        proxy_pass http://news_cluster;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /write {
        root /usr/share/nginx/html;
        try_files $uri /write/write.html;
    }

    location /login {
        root /usr/share/nginx/html;
        try_files $uri /login/login.html;
    }

    location /delete {
       root /usr/share/nginx/html;
       try_files $uri /delete/delete.html; 
    }

    location /images {
        root /usr/share/nginx/html;
        try_files $uri =404;
    }
}


